# ============================================================================
# CLASSIFICACAO POR TIPO DE DADO
# ============================================================================
# Esta secao classifica as colunas do dataset por tipo para facilitar
# a selecao automatica de funcoes de agregacao pelos agentes.
#
# Dataset: Cubo Sell-Out Chatbot (Baruel / IQVIA)
# Contexto: Dados de sell-out (vendas ao consumidor) de produtos pedicos
#           no canal Farma, incluindo marcas Baruel e concorrencia.
#
# - numeric: Colunas quantitativas que devem usar SUM() como agregacao padrao
# - categorical: Colunas qualitativas que devem usar COUNT() ou COUNT DISTINCT
# ============================================================================
column_types:
  numeric:
    - unidade
    - valor
    - ano_mes
    - ean
    - ano
    - mes

  temporal:
    - periodo
    - data_lancamento

  categorical:
    - canal
    - uf
    - catalog
    - uf_montada
    - regiao
    - macro_regiao
    - descricao
    - fabricante
    - marca
    - categoria
    - categoria_com_range
    - subcategoria
    - gramatura
    - regular_promo_refil
    - mercado
    - baruel_concorrencia
    - range_gramatura
    - marca_montada
    - fragrancia
    - publico
    - tipo
    - beneficio
    - rotina
    - lancamento
    - canal_macro
    - canal_interno

# ============================================================================
# PRIORIZACAO DE METRICAS
# ============================================================================
# Esta secao define qual metrica priorizar em contextos ambiguos.
# Escalavel: cada dataset define suas prioridades sem hardcode.
#
# - default_metric: Metrica padrao para queries genericas (ex: "top marcas")
#     Usada quando nenhum keyword especifico e detectado.
#
# - aggregation_metric: Metrica preferida para agregacoes SUM/ranking
#     (ex: "top marcas em vendas", "faturamento por regiao")
#     Representa o valor acumulado real, ideal para SUM e rankings.
#
# Logica de priorizacao no MetricDetector:
# 1. Se ha keyword match direto no alias.yaml -> usa o match
# 2. Se ha ambiguidade entre metricas -> prioriza aggregation_metric
# 3. Se nenhum match -> usa default_metric
# 4. Ultimo fallback -> primeira coluna numerica
# ============================================================================
metric_priority:
  default_metric: valor
  aggregation_metric: valor


