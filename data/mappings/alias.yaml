# ============================================================================
# HINTS DE FILTRO PARA HEURISTICAS DO QUERY ANALYZER
# ============================================================================
# Esta secao permite configurar entidades conhecidas que o QueryAnalyzer
# usa para detectar necessidade de filtros nas queries do usuario.
#
# - valid_years: anos validos presentes no dataset
# - known_entities.states: UFs presentes no dataset
# - known_entities.cities: cidades (nao disponivel neste dataset)
# ============================================================================
filter_hints:
  valid_years: [2023, 2024, 2025, 2026]
  known_entities:
    states:
      - "AC"
      - "AL"
      - "AM"
      - "AP"
      - "BA"
      - "CE"
      - "DF"
      - "ES"
      - "GO"
      - "MA"
      - "MG"
      - "MS"
      - "MT"
      - "PA"
      - "PB"
      - "PE"
      - "PI"
      - "PR"
      - "RJ"
      - "RN"
      - "RO"
      - "RR"
      - "RS"
      - "SC"
      - "SE"
      - "SP"
      - "TO"
    cities: []
  important_values:
    canal:
      - "Canal Redes"
      - "Canal Indep/Assoc/Franq"
    canal_interno:
      - "FARMA REDES/TOP"
      - "DIST. FARMA/ATACADO FARMA"
    regiao:
      - "SUDESTE"
      - "SUL"
      - "NORDESTE"
      - "NORTE"
      - "CENTRO OESTE"
    macro_regiao:
      - "NENO"
      - "SSECO"
    categoria:
      - "COSMETICOS"
      - "DESODORANTE"
      - "INCOMODOS"
    baruel_concorrencia:
      - "Baruel"
      - "Concorr\xEAncia"
    regular_promo_refil:
      - "REGULAR"
      - "PROMO"
    publico:
      - "Feminino"
      - "Masculino"
      - "Kids"
    lancamento:
      - "SIM"
      - "N\xC3O"
